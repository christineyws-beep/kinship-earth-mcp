name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --package kinship-orchestrator

      - name: Run tests
        env:
          NEON_API_TOKEN: ${{ secrets.NEON_API_TOKEN }}
        run: uv run --package kinship-orchestrator pytest servers/ -v
